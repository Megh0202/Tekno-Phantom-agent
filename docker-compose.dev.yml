# Dev override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# What this does:
#   Backend  — mounts ./backend/app into the container, uvicorn auto-reloads on save
#   Frontend — mounts ./frontend/src + public, Next.js HMR on save
#
# First-time setup (builds images, installs deps — only needed once or when deps change):
#   docker compose up --build -d
#
# Daily dev (fast — no rebuild):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  backend:
    environment:
      PLAYWRIGHT_DEFAULT_TIMEOUT_MS: 30000
      EXECUTION_FAST_PATH_SELECTOR_TIMEOUT_MS: 5000
      EXECUTION_FAST_PATH_ACTION_TIMEOUT_SECONDS: 10
      STRUCTURED_SELECTOR_WAIT_MS: 10000
    volumes:
      - ./backend/app:/app/app          # live-sync Python source
      - backend_data:/app/data
      - backend_artifacts:/app/artifacts
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app

  # Frontend intentionally left in production mode.
  # Only the backend is overridden for live-reload.
