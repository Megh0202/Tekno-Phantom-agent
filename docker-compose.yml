services:
  frontend:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - BACKEND_PORT=8000
      - BRAIN_BASE_URL=http://brain:5000

  brain:
    build: ./brain
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - brain
