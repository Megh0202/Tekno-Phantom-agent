services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_ADMIN_API_TOKEN: ${NEXT_PUBLIC_ADMIN_API_TOKEN:-}
        NEXT_PUBLIC_SHOW_ADVANCED_INPUTS: ${NEXT_PUBLIC_SHOW_ADVANCED_INPUTS:-false}
    expose:
      - "3000"
    environment:
      NODE_ENV: production

  backend:
    build: ./backend
    env_file:
      - ./.env
    expose:
      - "8000"
      - "6080"
    environment:
      BACKEND_PORT: 8000
      BRAIN_BASE_URL: http://brain:5000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - backend_data:/app/data
      - backend_artifacts:/app/artifacts

  brain:
    build: ./brain
    env_file:
      - ./.env
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - brain

volumes:
  backend_data:
  backend_artifacts:
